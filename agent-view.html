<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Agent View — NiCE CXone</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{
  --p50:#e5f2ff;--p100:#d2e7fe;--p200:#a7d0fe;--p300:#5ea9fd;
  --p400:#308ff8;--p500:#126bce;--p600:#17569b;--p700:#164479;
  --n0:#ffffff;--n25:#f9fafb;--n50:#f3f4f6;--n100:#e5e7eb;
  --n200:#d1d5db;--n300:#9ca3af;--n400:#6b7280;--n500:#4b5563;
  --n600:#374151;--n700:#1f2937;--n800:#111827;
  --ok:#208337;--ok-bg:#effbf1;--ok-bd:#24943e;
  --warn:#ffb800;--warn-bg:#fff6e0;
  --err:#e32926;--err-bg:#fdeaea;
  --sh-xs:0 1px 2px #1f29370f;--sh-sm:0 1px 3px #1f29371a;--sh-md:0 4px 6px #1f29371f;--sh-lg:0 10px 15px #1f293724;
  --r-xs:4px;--r-sm:6px;--r-md:8px;--r-lg:12px;--r-full:9999px;
  --sidebar-w:260px;--tr-w:280px;--hdr-h:48px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',system-ui,sans-serif;height:100vh;overflow:hidden;
  display:flex;flex-direction:column;background:var(--n50);color:var(--n800);
  font-size:13px;-webkit-font-smoothing:antialiased;}

/* ── HEADER ── */
.hdr{height:var(--hdr-h);background:var(--p500);display:flex;align-items:center;
  padding:0 16px;gap:12px;flex-shrink:0;box-shadow:var(--sh-md);}
.hdr-logo{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.hdr-logo svg{width:22px;height:22px;}
.hdr-logo-name{color:#fff;font-size:14px;font-weight:600;letter-spacing:-.01em;}
.hdr-div{width:1px;height:20px;background:rgba(255,255,255,.2);flex-shrink:0;}
.hdr-prod{color:rgba(255,255,255,.6);font-size:12px;font-weight:500;}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:12px;}
.hdr-bell{color:rgba(255,255,255,.55);font-size:14px;position:relative;cursor:pointer;padding:4px;}
.hdr-bell-dot{position:absolute;top:2px;right:2px;width:8px;height:8px;border-radius:50%;background:var(--err);border:1.5px solid var(--p500);}
.in-call{display:flex;align-items:center;gap:6px;background:rgba(32,131,55,.2);
  border:1px solid rgba(36,148,62,.35);border-radius:var(--r-sm);
  padding:4px 12px;color:#6ee2a0;font-size:11px;font-weight:600;}
.in-call-dot{width:7px;height:7px;border-radius:50%;background:var(--ok);animation:pulse 1.6s infinite;}
.in-call.ended{background:rgba(180,30,30,.15);border-color:rgba(200,40,40,.3);color:#e57373;}
.in-call.ended .in-call-dot{background:#e57373;animation:none;}
.pat-alert{display:flex;align-items:center;gap:10px;background:#fff8f0;border:1px solid #f5c07a;
  border-left:3px solid #e67e22;border-radius:6px;padding:10px 12px;margin:6px 0 2px;
  cursor:pointer;transition:background .15s;animation:fadeSlideIn .35s ease;}
.pat-alert.sev-red{background:#fff5f5;border-color:#f5b7b1;border-left-color:#c0392b;}
.pat-alert.sev-yellow{background:#fffdf0;border-color:#f9e79f;border-left-color:#d4ac0d;}
.pat-alert:hover{filter:brightness(.97);}
.pat-alert-icon{font-size:15px;flex-shrink:0;}
.pat-alert-body{flex:1;min-width:0;}
.pat-alert-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;
  color:#922b21;margin-bottom:2px;}
.pat-alert.sev-yellow .pat-alert-lbl{color:#9a7d0a;}
.pat-alert.sev-orange .pat-alert-lbl{color:#935116;}
.pat-alert-msg{font-size:11px;color:var(--n600);line-height:1.35;}
.pat-alert-cta{font-size:10px;font-weight:600;color:var(--p400);white-space:nowrap;
  flex-shrink:0;padding-left:6px;}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.tl-pending{display:flex;align-items:center;gap:10px;padding:24px 16px;font-size:12px;
  color:var(--n400);font-style:italic;}
.tl-pending-dot{width:8px;height:8px;border-radius:50%;background:var(--ok);
  animation:pulse 1.4s infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(.75);}}
.hdr-av{width:30px;height:30px;border-radius:50%;background:var(--p600);
  color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;}

/* ── BODY ── */
.body{flex:1;display:flex;overflow:hidden;}

/* ══════════════════════════════
   SIDEBAR NAV
══════════════════════════════ */
.sidebar{width:var(--sidebar-w);background:var(--n0);border-right:1px solid var(--n100);
  display:flex;flex-direction:column;flex-shrink:0;}

/* sidebar title */
.sb-title{padding:14px 16px 10px;display:flex;align-items:center;gap:8px;flex-shrink:0;border-bottom:1px solid var(--n100);}
.sb-title-icon{color:var(--n400);font-size:14px;}
.sb-title-text{font-size:14px;font-weight:600;color:var(--n700);}

/* cases section */
.sb-cases{padding:10px 12px 4px;flex-shrink:0;}
.sb-cases-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.sb-cases-lbl{font-size:11px;font-weight:700;color:var(--n700);}
.sb-cases-sub{font-size:10px;color:var(--n400);}
.sb-new-case{width:100%;padding:7px;border:1px dashed var(--n200);border-radius:var(--r-sm);
  background:transparent;color:var(--n400);font-size:12px;font-weight:500;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:5px;
  transition:all .18s;margin-bottom:10px;}
.sb-new-case:hover{border-color:var(--p300);color:var(--p500);background:var(--p50);}

/* active call card */
.call-card{margin:0 4px 8px;border:2px solid var(--warn);border-radius:var(--r-md);
  background:var(--n0);box-shadow:0 0 0 3px rgba(255,184,0,.12);overflow:hidden;cursor:pointer;}
.cc-top{padding:10px 10px 6px;display:flex;align-items:flex-start;justify-content:space-between;gap:6px;}
.cc-name{font-size:13px;font-weight:700;color:var(--n800);}
.cc-top-right{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.cc-status{display:flex;align-items:center;gap:4px;background:var(--ok-bg);
  border:1px solid var(--ok-bd);color:var(--ok);font-size:10px;font-weight:700;
  padding:2px 8px;border-radius:var(--r-full);cursor:pointer;white-space:nowrap;}
.cc-status i{font-size:8px;}
.cc-menu{width:22px;height:22px;display:flex;align-items:center;justify-content:center;
  border-radius:var(--r-sm);color:var(--n400);cursor:pointer;font-size:13px;}
.cc-menu:hover{background:var(--n50);}
.cc-desc{padding:0 10px 8px;font-size:11px;color:var(--n600);line-height:1.5;}
.cc-time{padding:0 10px 8px;display:flex;align-items:center;gap:4px;font-size:10px;color:var(--n400);}
.cc-time-dot{width:5px;height:5px;border-radius:50%;background:var(--ok);animation:pulse 1.5s infinite;}
.cc-progress{padding:0 10px 8px;font-size:10px;color:var(--n400);font-style:italic;}
.cc-actions{display:grid;grid-template-columns:1fr 1fr 1fr;border-top:1px solid var(--n100);}
.cc-btn{padding:8px;display:flex;flex-direction:column;align-items:center;gap:3px;
  background:var(--n0);border:none;cursor:pointer;font-size:10px;font-weight:600;color:var(--n500);
  transition:background .15s;border-right:1px solid var(--n100);}
.cc-btn:last-child{border-right:none;}
.cc-btn:hover{background:var(--n50);}
.cc-btn.end{color:var(--err);}
.cc-btn.end:hover{background:var(--err-bg);}
.cc-btn i{font-size:15px;}

/* nav links */
.sb-nav{border-top:1px solid var(--n100);padding:8px 0;flex-shrink:0;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;
  font-size:12px;font-weight:500;color:var(--n500);cursor:pointer;
  transition:all .15s;position:relative;}
.nav-item:hover{background:var(--n50);color:var(--n700);}
.nav-item.active{background:var(--p50);color:var(--p600);}
.nav-item i{width:16px;text-align:center;font-size:13px;flex-shrink:0;}
.nav-badge{margin-left:auto;background:var(--err);color:#fff;
  font-size:9px;font-weight:700;padding:1px 6px;border-radius:var(--r-full);}

/* ══════════════════════════════
   MAIN AREA
══════════════════════════════ */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.tab-bar{height:40px;background:var(--n0);border-bottom:1px solid var(--n100);
  display:flex;align-items:stretch;flex-shrink:0;padding:0 4px;}
.m-tab{display:flex;align-items:center;gap:6px;padding:0 16px;
  font-size:12px;font-weight:500;cursor:pointer;color:var(--n400);
  border-bottom:2px solid transparent;white-space:nowrap;transition:all .18s;}
.m-tab:hover{color:var(--n600);}
.m-tab.active{color:var(--p500);border-bottom-color:var(--p500);font-weight:600;}
.tab-content{flex:1;overflow-y:auto;padding:16px 20px;}
/* ── CHAT INPUT BAR ── */
.body-wrap{flex:1;display:flex;overflow:hidden;}
.main-col{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.chat-bar{flex-shrink:0;background:var(--n0);border-top:1px solid var(--n100);padding:10px 16px;}
.chat-bar-inner{display:flex;align-items:center;gap:8px;background:var(--n0);
  border:1.5px solid var(--n200);border-radius:var(--r-lg);padding:8px 10px 8px 14px;
  box-shadow:var(--sh-sm);transition:border-color .18s;}
.chat-bar-inner:focus-within{border-color:var(--p400);box-shadow:0 0 0 3px rgba(48,143,248,.12);}
.chat-bar-add{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--n300);
  background:transparent;color:var(--n400);display:flex;align-items:center;justify-content:center;
  font-size:11px;cursor:pointer;flex-shrink:0;transition:all .15s;}
.chat-bar-add:hover{border-color:var(--p400);color:var(--p500);}
.chat-bar-input{flex:1;border:none;outline:none;font-family:inherit;font-size:13px;
  color:var(--n800);background:transparent;resize:none;min-height:20px;max-height:80px;line-height:1.5;}
.chat-bar-input::placeholder{color:var(--n300);}
.chat-bar-send{width:32px;height:32px;border-radius:50%;background:var(--p500);
  border:none;color:#fff;display:flex;align-items:center;justify-content:center;
  font-size:13px;cursor:pointer;flex-shrink:0;transition:background .15s;}
.chat-bar-send:hover{background:var(--p600);}
/* ── REALTIME TRANSCRIPT PANEL ── */
.transcript-panel{width:260px;flex-shrink:0;background:var(--n0);border-left:1px solid var(--n100);
  display:flex;flex-direction:column;overflow:hidden;transition:width .25s ease;}
.transcript-panel.hidden{width:0;border:none;overflow:hidden;}
.tr-hdr{padding:10px 14px 8px;border-bottom:1px solid var(--n100);display:flex;align-items:center;gap:8px;flex-shrink:0;}
.tr-hdr-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--n500);flex:1;white-space:nowrap;}
.tr-hdr-name{font-size:10px;color:var(--n400);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px;}
.tr-live{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:700;color:var(--ok);white-space:nowrap;flex-shrink:0;}
.tr-live-dot{width:6px;height:6px;border-radius:50%;background:var(--ok);animation:pulse 1.4s infinite;flex-shrink:0;}
.tr-close{width:20px;height:20px;border:none;background:transparent;color:var(--n300);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;border-radius:var(--r-xs);}
.tr-close:hover{background:var(--n50);color:var(--n600);}
.tr-scroll{flex:1;overflow-y:auto;padding:12px 12px 8px;}
.tr-entry{margin-bottom:10px;}
.tr-speaker{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--n400);margin-bottom:3px;display:flex;align-items:center;gap:5px;}
.tr-speaker.cust-sp{color:var(--p500);}
.tr-ts{font-size:9px;color:var(--n300);font-weight:400;text-transform:none;letter-spacing:0;}
.tr-bubble{background:var(--n25);border:1px solid var(--n100);border-radius:var(--r-sm);padding:7px 10px;font-size:12px;color:var(--n700);line-height:1.55;}
.tr-bubble.cust{background:var(--p50);border-color:var(--p100);}
.tr-bubble.typing{display:flex;align-items:center;gap:3px;padding:9px 12px;}
.tr-dot{width:5px;height:5px;border-radius:50%;background:var(--n300);animation:tr-bounce .9s infinite;}
.tr-dot:nth-child(2){animation-delay:.15s;}
.tr-dot:nth-child(3){animation-delay:.3s;}
@keyframes tr-bounce{0%,80%,100%{transform:translateY(0);}40%{transform:translateY(-4px);}}
.tr-node-divider{margin:10px 0 8px;padding:6px 8px 6px 10px;background:var(--n25);border-left:3px solid var(--p400);border-radius:0 var(--r-sm) var(--r-sm) 0;}
.tr-node-seq{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--p500);margin-bottom:3px;}
.tr-node-ttl{font-size:11px;font-weight:600;color:var(--n700);line-height:1.3;margin-bottom:5px;}
.tr-patterns{display:flex;flex-wrap:wrap;gap:4px;}
.tr-pat{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;border:1px solid;}
.tr-pat.sev-red{color:#c0392b;background:#fdf0ef;border-color:#f5b7b1;}
.tr-pat.sev-orange{color:#d35400;background:#fef5ec;border-color:#fad7a0;}
.tr-pat.sev-yellow{color:#9a7d0a;background:#fefdf0;border-color:#f9e79f;}


/* Voice tab */
.conv-lbl{font-size:10px;font-weight:700;color:var(--n400);text-transform:uppercase;
  letter-spacing:.06em;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.connected-line{display:flex;align-items:center;gap:8px;padding:8px 12px;
  background:var(--ok-bg);border:1px solid var(--ok-bd);border-radius:var(--r-md);
  margin-bottom:12px;font-size:12px;color:var(--ok);font-weight:600;}
.int-note{background:var(--n0);border:1px solid var(--ok-bd);border-left:3px solid var(--ok);
  border-radius:var(--r-md);padding:12px 16px;margin-bottom:12px;box-shadow:var(--sh-xs);}
.note-tag{display:inline-flex;align-items:center;gap:5px;background:var(--ok-bg);
  border:1px solid var(--ok-bd);color:var(--ok);font-size:10px;font-weight:700;
  padding:2px 8px;border-radius:var(--r-xs);margin-bottom:8px;}
.note-body{font-size:12px;color:var(--n700);line-height:1.7;}
.note-body strong{color:var(--n800);font-weight:600;}
.snapshot{background:var(--n0);border:1px solid var(--n100);border-radius:var(--r-md);
  padding:12px 16px;margin-bottom:12px;box-shadow:var(--sh-xs);}
.snap-hdr{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.snap-av{width:36px;height:36px;border-radius:50%;background:var(--p50);color:var(--p600);
  font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.snap-name{font-size:14px;font-weight:600;color:var(--n800);}
.snap-sub{font-size:11px;color:var(--n400);margin-top:1px;}
.snap-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px;}
.snap-tag{font-size:10px;padding:2px 7px;border-radius:var(--r-full);
  border:1px solid var(--n100);color:var(--n500);background:var(--n50);}
.snap-sec-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--n400);margin-bottom:6px;}
.snap-bullet{display:flex;align-items:flex-start;gap:6px;font-size:12px;color:var(--n700);padding:3px 0;line-height:1.5;}
.snap-bullet::before{content:"·";color:var(--p400);font-weight:700;flex-shrink:0;font-size:16px;line-height:1.1;}
.ai-lines{background:var(--n0);border:1px solid var(--n100);border-radius:var(--r-md);
  padding:12px 16px;box-shadow:var(--sh-xs);}
.ai-lines-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:11px;font-weight:700;color:var(--n700);}
.ai-lines-hdr i{color:var(--p500);}
.ai-line{padding:9px 12px;border:1px solid var(--n100);border-radius:var(--r-sm);
  margin-bottom:8px;cursor:pointer;transition:all .18s;background:var(--n25);}
.ai-line:last-child{margin-bottom:0;}
.ai-line:hover{border-color:var(--p300);background:var(--p50);}
.ai-line-q{font-size:12px;color:var(--n800);line-height:1.5;margin-bottom:2px;}
.ai-line-hint{font-size:10px;color:var(--n400);font-style:italic;}

/* History tab */
.hist-wrap{display:flex;gap:16px;}
.hist-tl{width:36%;min-width:220px;}
.hist-tl-hdr{font-size:10px;font-weight:700;color:var(--n400);text-transform:uppercase;
  letter-spacing:.06em;margin-bottom:8px;display:flex;align-items:center;gap:5px;}
.risk-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;
  border-radius:var(--r-full);font-size:11px;font-weight:700;margin-bottom:12px;}
.tl-node{display:flex;gap:12px;padding:12px 10px;border-radius:var(--r-md);cursor:pointer;
  transition:all .18s;position:relative;margin-bottom:1px;}
.tl-node{border:1px solid var(--n100);margin-bottom:6px;background:var(--n0);}
.tl-node:hover{background:var(--n25);border-color:var(--n200);}
.tl-node.sel{background:var(--p50);border-color:var(--p200);outline:none;}
.tl-node:not(:last-child)::after{content:'';position:absolute;left:31px;top:60px;
  width:2px;height:calc(100% - 12px);background:var(--n100);z-index:0;}
.tl-ic{width:36px;height:36px;border-radius:50%;border:2px solid var(--n100);
  background:var(--n0);display:flex;align-items:center;justify-content:center;
  font-size:12px;flex-shrink:0;z-index:1;position:relative;}
.tl-body{flex:1;min-width:0;}
.tl-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;}
.tl-ttl{font-size:12px;font-weight:600;color:var(--n700);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tl-dt{font-size:10px;color:var(--n400);white-space:nowrap;margin-left:6px;flex-shrink:0;}
.tl-ag{font-size:11px;color:var(--n400);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:6px;}
.tl-foot{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:6px;}
.tl-foot .sent-ico{width:18px;height:18px;border-radius:4px;}
.tl-csat{font-size:10px;padding:2px 7px;border-radius:var(--r-full);font-weight:600;}
.c1{background:var(--err-bg);color:var(--err);}
.c2{background:var(--warn-bg);color:#856404;}
.c3{background:#fffde7;color:#795b00;}
.c4{background:var(--ok-bg);color:var(--ok);}
.c5{background:#e8f5e9;color:#1b5e20;}
.esc-tag{font-size:9px;background:var(--err-bg);color:var(--err);
  padding:1px 5px;border-radius:var(--r-xs);font-weight:700;}
.hist-brief{flex:1;display:flex;flex-direction:column;gap:10px;min-width:0;}
.brief-card{background:var(--n0);border:1px solid var(--n100);border-radius:var(--r-md);padding:12px 16px;box-shadow:var(--sh-xs);}
.brief-hdr{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;
  color:var(--n600);margin-bottom:10px;display:flex;align-items:center;gap:5px;}
.brief-hdr i{color:var(--p500);}
.risk-hero{display:flex;align-items:center;gap:16px;}
.risk-ring{width:72px;height:72px;position:relative;flex-shrink:0;}
.risk-ring svg{transform:rotate(-90deg);}
.risk-bg{fill:none;stroke:var(--n100);stroke-width:7;}
.risk-fg{fill:none;stroke-width:7;stroke-linecap:round;
  stroke-dasharray:201;stroke-dashoffset:201;transition:stroke-dashoffset 1.3s ease;}
.risk-in{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.risk-num{font-size:17px;font-weight:700;line-height:1;}
.risk-den{font-size:9px;color:var(--n400);}
.risk-lbl{font-size:17px;font-weight:700;margin-bottom:4px;}
.risk-sc{font-size:12px;color:var(--n500);line-height:1.5;}
.pat-tbl{width:100%;border-collapse:collapse;}
.pat-tbl tr{border-bottom:1px solid var(--n50);cursor:pointer;transition:background .15s;}
.pat-tbl tr:last-child{border-bottom:none;}
.pat-tbl tr:hover{background:var(--n50);}
.pat-tbl tr.active{background:var(--p50);outline:1.5px solid var(--p200);}
.pat-tbl td{padding:6px 3px;font-size:11px;vertical-align:top;}
.pt-sev{width:38px;padding-right:8px;}
.pat-count{display:inline-flex;align-items:center;justify-content:center;
  min-width:30px;padding:2px 8px;font-size:11px;font-weight:700;
  border-radius:var(--r-full);color:#fff;line-height:1.4;}
.pat-count.sev-r{background:var(--err);}
.pat-count.sev-o{background:#d97706;}
.pt-lbl{font-weight:600;width:36%;padding-right:8px;color:var(--n700);}
.pt-desc{color:var(--n400);}
.act-item{display:flex;gap:8px;padding:8px 0;border-bottom:1px solid var(--n50);align-items:flex-start;}
.act-item:last-child{border-bottom:none;}
.act-num{width:20px;height:20px;border-radius:50%;background:var(--p500);color:#fff;
  font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.act-body{flex:1;min-width:0;}
.act-pri{font-size:9px;font-weight:700;text-transform:uppercase;
  padding:2px 5px;border-radius:var(--r-xs);display:inline-block;margin-bottom:3px;}
.pri-critical{background:var(--err-bg);color:var(--err);}
.pri-high{background:var(--warn-bg);color:#92400e;}
.pri-medium{background:#fffde7;color:#795b00;}
.act-txt{font-size:12px;line-height:1.5;color:var(--n700);}
.act-btn{display:inline-flex;align-items:center;gap:5px;margin-top:6px;
  padding:4px 10px;background:var(--p500);color:#fff;border:none;
  border-radius:var(--r-sm);font-size:10px;font-weight:600;font-family:inherit;
  cursor:pointer;transition:background .15s;}
.act-btn:hover{background:var(--p600);}
.act-btn i{font-size:10px;}
.act-btn.btn-call{background:var(--ok);}
.act-btn.btn-call:hover{background:#1a6e2e;}
.act-btn.btn-apply{background:#7c3aed;}
.act-btn.btn-apply:hover{background:#6d28d9;}
.act-btn.btn-apologize{background:#db2777;}
.act-btn.btn-apologize:hover{background:#be185d;}
.act-btn.btn-schedule{background:#0891b2;}
.act-btn.btn-schedule:hover{background:#0e7490;}
.act-btn.btn-flag{background:var(--n500);}
.act-btn.btn-flag:hover{background:var(--n600);}

/* ── CHAT BUBBLES (used in drawer) ── */
.bubble{margin-bottom:10px;}
.bubble-sp{font-size:9px;font-weight:700;color:var(--n300);margin-bottom:3px;
  text-transform:uppercase;letter-spacing:.05em;}
.bubble-txt{display:inline-block;padding:8px 12px;border-radius:var(--r-md);font-size:12px;
  line-height:1.6;max-width:90%;white-space:pre-line;}
.b-cust .bubble-sp{color:var(--p500);}
.b-cust .bubble-txt{background:var(--p50);color:var(--n700);border:1px solid var(--p100);}
.b-agent .bubble-sp{color:var(--n400);}
.b-agent .bubble-txt{background:var(--n50);color:var(--n700);border:1px solid var(--n100);}
.b-sys .bubble-sp{color:var(--ok);}
.b-sys .bubble-txt{background:var(--ok-bg);color:#155724;font-style:italic;font-size:11px;border:1px solid var(--ok-bd);}

/* ── DRAWER ── */
.overlay{position:fixed;inset:0;background:rgba(17,24,39,.3);z-index:200;
  opacity:0;pointer-events:none;transition:opacity .25s;}
.overlay.on{opacity:1;pointer-events:all;}
.drawer{position:fixed;right:0;top:0;bottom:0;width:400px;background:var(--n0);
  box-shadow:0 25px 50px #1f29372e;z-index:201;transform:translateX(100%);
  transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;}
.drawer.on{transform:translateX(0);}
.dr-hdr{padding:12px 16px;background:var(--p500);display:flex;align-items:center;gap:8px;flex-shrink:0;}
.dr-ic{font-size:18px;}
.dr-info h3{font-size:13px;font-weight:600;color:#fff;}
.dr-info p{font-size:10px;color:rgba(255,255,255,.5);}
.dr-close{margin-left:auto;width:26px;height:26px;border-radius:var(--r-sm);
  background:rgba(255,255,255,.1);color:#fff;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:12px;}
.dr-close:hover{background:rgba(255,255,255,.2);}
.dr-meta{padding:8px 16px;background:var(--n25);border-bottom:1px solid var(--n100);
  display:flex;gap:12px;flex-shrink:0;}
.dr-mi .dr-ml{font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:var(--n400);font-weight:700;}
.dr-mi .dr-mv{font-size:12px;font-weight:600;margin-top:1px;color:var(--n700);}
.dr-body{flex:1;overflow-y:auto;padding:12px 16px;}
.dr-out{padding:10px 16px;border-top:1px solid var(--n100);flex-shrink:0;}
.dr-out-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:var(--n400);font-weight:700;margin-bottom:3px;}
.dr-out-txt{font-size:12px;line-height:1.5;color:var(--n700);}

::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--n200);border-radius:var(--r-full);}

/* ── CUSTOMER STATUS BADGE ── */
.cust-badge{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:700;
  text-transform:uppercase;letter-spacing:.04em;padding:2px 7px;border-radius:var(--r-full);
  border:1px solid transparent;vertical-align:middle;white-space:nowrap;}
.cb-critical{background:var(--err-bg);color:var(--err);border-color:#fca5a5;}
.cb-high{background:var(--warn-bg);color:#92400e;border-color:#fcd34d;}
.cb-low{background:var(--ok-bg);color:var(--ok);border-color:var(--ok-bd);}
.cc-name-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.snap-name-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}

/* ── PATTERN PILL LABELS (Voice tab) ── */
.pat-labels{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px;}
.pat-pill{font-size:10px;font-weight:600;padding:3px 8px;border-radius:var(--r-full);
  border:1px solid transparent;line-height:1.4;white-space:nowrap;}
.pat-pill.sev-r{background:var(--err-bg);color:var(--err);border-color:#fca5a5;}
.pat-pill.sev-o{background:var(--warn-bg);color:#92400e;border-color:#fcd34d;}

/* ── FAILURE PATTERN WIDGETS (Voice tab) ── */
.pat-widgets{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:6px;}
.pat-widget{padding:8px 10px;border:1px solid var(--n100);border-left:3px solid var(--n200);
  border-radius:var(--r-sm);background:var(--n0);cursor:pointer;transition:all .18s;}
.pat-widget:hover{box-shadow:var(--sh-sm);background:var(--n25);border-color:var(--n200);}
.pat-widget.pw-r{border-left-color:var(--err);}
.pat-widget.pw-o{border-left-color:var(--warn);}
.pw-top{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;
  color:var(--n800);margin-bottom:3px;}
.pw-lbl{font-size:12px;}
.pw-desc{font-size:11px;color:var(--n500);line-height:1.4;}

/* ── ISSUE CHIPS PER NODE (Journey timeline) ── */
.issue-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:2px;}
.issue-chip{font-size:10px;font-weight:500;padding:3px 9px;border-radius:var(--r-full);
  cursor:pointer;border:1px solid transparent;line-height:1.4;transition:filter .15s;}
.issue-chip:hover{filter:brightness(.92);}
.issue-chip.active{outline:1.5px solid currentColor;outline-offset:1px;}
.ic-broken-promise{background:var(--err-bg);color:var(--err);}
.ic-sla-breach{background:var(--warn-bg);color:#92400e;}
.ic-routing-failure{background:var(--p50);color:var(--p600);}
.ic-ownership-gap{background:#ffedd5;color:#9a3412;}
.ic-repeat-contact{background:#fef3c7;color:#854d0e;}
.ic-inconsistent-information{background:#ede9fe;color:#6d28d9;}

/* ── pattern highlights in drawer transcript ── */
.hl-pattern{padding:2px 6px;border-radius:4px;box-decoration-break:clone;
  -webkit-box-decoration-break:clone;line-height:1.85;}
.hl-pattern .hl-tag{display:inline-block;font-size:9px;font-weight:800;
  text-transform:uppercase;letter-spacing:.04em;margin-left:6px;padding:1px 6px;
  border-radius:var(--r-xs);background:rgba(255,255,255,.65);vertical-align:1px;}
.hl-broken-promise{background:#fee2e2;color:#991b1b;}
.hl-broken-promise .hl-tag{color:#991b1b;}
.hl-sla-breach{background:#fef3c7;color:#92400e;}
.hl-sla-breach .hl-tag{color:#92400e;}
.hl-routing-failure{background:#dbeafe;color:#1e40af;}
.hl-routing-failure .hl-tag{color:#1e40af;}
.hl-ownership-gap{background:#ffedd5;color:#9a3412;}
.hl-ownership-gap .hl-tag{color:#9a3412;}
.hl-repeat-contact{background:#fef9c3;color:#854d0e;}
.hl-repeat-contact .hl-tag{color:#854d0e;}
.hl-inconsistent-information{background:#ede9fe;color:#6d28d9;}
.hl-inconsistent-information .hl-tag{color:#6d28d9;}
.dr-pats{padding:8px 10px;background:var(--n25);border:1px solid var(--n100);
  border-radius:var(--r-sm);margin-bottom:12px;}
.dr-pats-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
  color:var(--n400);margin-bottom:5px;}
.dr-pats-row{display:flex;flex-wrap:wrap;gap:4px;}
.dr-pats-empty{font-size:11px;color:var(--n400);font-style:italic;}

/* ── ISSUE FILTER BAR + NODE STATES ── */
.flt-bar{display:none;align-items:center;gap:6px;padding:6px 10px;background:var(--n50);
  border:1px solid var(--n100);border-radius:var(--r-sm);font-size:11px;margin-bottom:8px;}
.flt-bar.on{display:flex;}
.flt-bar-lbl{font-weight:600;color:var(--n500);}
.flt-bar-tag{font-weight:700;padding:2px 8px;border-radius:var(--r-xs);}
.flt-bar-x{margin-left:auto;cursor:pointer;color:var(--n400);width:20px;height:20px;
  display:flex;align-items:center;justify-content:center;border-radius:var(--r-xs);font-size:11px;}
.flt-bar-x:hover{background:var(--n100);color:var(--n700);}
.tl-node.dim{opacity:.35;filter:grayscale(1);}
.tl-node.hl{outline:2px solid;outline-offset:-1px;background:var(--n0);}

/* ── JOURNEY TIMELINE CUSTOMER HEADER ── */
.tl-cust-line{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.tl-cust-name{font-size:13px;font-weight:600;color:var(--n800);}

/* ── SENTIMENT ICON ── */
.sent-ico{width:16px;height:16px;display:inline-block;vertical-align:middle;flex-shrink:0;}
.dr-mv .sent-ico{width:18px;height:18px;margin-right:4px;}

/* ── PROFESSIONALISM OVERRIDES ── */

/* Failure pattern count badges: red only for critical, others muted */
.pat-count{background:var(--n400)!important;font-size:11px;}
.pat-count.sev-r{background:var(--err)!important;}
.pat-count.sev-o{background:var(--n300)!important;}

/* Pattern pills in Voice tab: softer, border-only style */
.pat-pill.sev-r{background:transparent;color:var(--err);border-color:#fca5a5;}
.pat-pill.sev-o{background:transparent;color:#92400e;border-color:#fcd34d;}

/* Issue chips — all neutral, no color noise */
.issue-chip{font-weight:500;background:var(--n50);color:var(--n500);border:1px solid var(--n150);padding:2px 8px;font-size:10px;}
.ic-broken-promise,.ic-sla-breach,.ic-ownership-gap,.ic-repeat-contact,.ic-routing-failure,.ic-inconsistent-information{
  background:var(--n50);color:var(--n500);border-color:var(--n150);}
.ic-broken-promise{color:var(--n700);}
.ic-broken-promise::before{content:'';display:inline-block;width:4px;height:4px;
  border-radius:50%;background:var(--err);margin-right:4px;vertical-align:1px;}
/* CSAT: color by score */
.tl-csat{font-size:10px;padding:0;background:transparent!important;border:none!important;font-weight:600;color:var(--err)!important;}
.tl-csat.c4,.tl-csat.c5{color:#16a34a!important;}
.esc-tag{font-size:9px;background:transparent!important;color:var(--err)!important;border:none!important;padding:0;font-weight:600;}
/* Sentiment emoji visible */
.tl-foot .sent-ico{display:inline-flex;}

/* ── TASK AUTOMATION CARDS ── */
.task-card{margin-top:8px;border:1px solid var(--n100);border-radius:var(--r-md);
  background:var(--n25);overflow:hidden;animation:taskIn .3s ease;}
@keyframes taskIn{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
.task-hdr{display:flex;align-items:center;gap:8px;padding:8px 12px;
  background:var(--n0);border-bottom:1px solid var(--n100);}
.task-id{font-size:10px;font-weight:700;color:var(--p600);font-family:monospace;}
.task-status{margin-left:auto;display:flex;align-items:center;gap:5px;
  font-size:10px;font-weight:600;padding:2px 8px;border-radius:var(--r-full);}
.ts-pending{background:#fff6e0;color:#92400e;}
.ts-inprogress{background:var(--p50);color:var(--p600);}
.ts-done{background:var(--ok-bg);color:var(--ok);}
.task-status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.ts-pending .task-status-dot{background:#ffb800;animation:pulse 1.4s infinite;}
.ts-inprogress .task-status-dot{background:var(--p400);animation:pulse 1.4s infinite;}
.ts-done .task-status-dot{background:var(--ok);}
.task-body{padding:8px 12px;}
.task-row{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--n600);margin-bottom:4px;}
.task-row:last-child{margin-bottom:0;}
.task-row i{width:14px;text-align:center;color:var(--n400);font-size:10px;flex-shrink:0;}
.task-row strong{color:var(--n700);}
.task-progress{height:3px;background:var(--n100);border-radius:var(--r-full);margin:8px 12px 8px;}
.task-progress-bar{height:100%;border-radius:var(--r-full);background:var(--p400);
  width:0%;transition:width .8s ease;}
.act-btn-done{display:inline-flex;align-items:center;gap:5px;margin-top:6px;
  padding:5px 12px;border-radius:var(--r-full);font-size:11px;font-weight:600;
  background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok-bd);cursor:pointer;}
.act-btn-done:hover{filter:brightness(.95);}
/* ── TOAST ── */
#toast-container{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--n800);color:#fff;
  border-radius:var(--r-md);font-size:12px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.25);
  pointer-events:all;opacity:0;transform:translateY(12px);transition:opacity .25s,transform .25s;}
.toast.show{opacity:1;transform:translateY(0);}
.toast-icon{font-size:14px;flex-shrink:0;}
.toast-body{flex:1;}
.toast-title{font-weight:700;font-size:12px;margin-bottom:2px;}
.toast-sub{font-size:11px;color:rgba(255,255,255,.65);}
.toast-close{background:none;border:none;color:rgba(255,255,255,.5);cursor:pointer;font-size:14px;padding:0;margin-left:4px;}
.toast-close:hover{color:#fff;}

.act-counter{margin-left:auto;display:inline-flex;align-items:center;gap:4px;
  background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok-bd);
  border-radius:var(--r-full);font-size:10px;font-weight:700;padding:2px 8px;}
.act-counter i{font-size:9px;}

/* Allow chips to wrap naturally */
.issue-chips{flex-wrap:wrap;overflow:visible;max-height:none;}

/* Timeline highlighted nodes: elevated card with amber accent */
.tl-node.hl{
  outline:none!important;
  border-left:4px solid var(--warn);
  padding-left:6px;
  background:var(--n0);
  box-shadow:0 2px 8px rgba(0,0,0,.1), 0 0 0 1px rgba(255,184,0,.25);
  border-radius:0 var(--r-sm) var(--r-sm) 0;
  position:relative;z-index:1;
}
/* Dimmed nodes: clearly faded */
.tl-node.dim{opacity:.2!important;filter:grayscale(1)!important;}

/* ESC tag: border-only, less aggressive */
.esc-tag{background:transparent;color:var(--err);border:1px solid #fca5a5;font-weight:600;}

/* CSAT badges: text only, no fill */
.c1{background:transparent;color:var(--err);border:1px solid #fca5a5;}
.c2{background:transparent;color:#92400e;border:1px solid #fcd34d;}

/* Recommended Actions priority label: inline subdued tag, not all-caps red block */
.act-pri{text-transform:none;font-weight:600;font-size:10px;letter-spacing:0;}
.pri-critical{background:transparent;color:var(--err);border:none;padding:0;}
.pri-critical::before{content:'● ';font-size:8px;}
.pri-high{background:transparent;color:#92400e;border:none;padding:0;}
.pri-high::before{content:'● ';font-size:8px;}
.pri-medium{background:transparent;color:#795b00;border:none;padding:0;}
.pri-medium::before{content:'● ';font-size:8px;}

/* Pat alert (Voice tab): remove heavy left border on non-critical */
.pat-alert{border-left-color:var(--n200);}
.pat-alert.sev-red{border-left-color:var(--err);}
</style>
</head>

/* ── issue tag detection per node ── */
const ISSUE_RULES=[
  {tag:'Broken Promise',         re:/\b(promise|promised|promising|commitment|get back to you|look into (this|it)( further)?|let me look into|i'?ll (make a note|flag|investigate|review|raise|call you back|get back|look)|callback within|within (24|48|72) ?hours?|i'?m raising|raising a formal ticket)\b/i},
  {tag:'SLA Breach',             re:/\b(sla|exceeded|been waiting|haven'?t heard|open for|\d+ days (ago|open|without)|fifteen days|sixteen days|seventeen days|nineteen days|twenty days|22 days|14\+ days|sla not met|callback sla|sitting (there|in)|days without|nineteen)\b/i},
  {tag:'Routing Failure',        re:/\b(routing|routed|wrong (team|queue|department)|misrouted|re-?routed|network faults queue|wrong queue|routed to .{1,40}? instead)\b/i},
  {tag:'Ownership Gap',          re:/\b(no response|unassigned|nobody|no (single )?owner|takes ownership|two (open )?issues|no one (owns|has|takes)|i'?m in .{1,30}? so i can'?t|own my account|owns this|i can'?t update|i can'?t action|no adjuster|assignment queue|failed silently|passed around|don'?t have details|no record of|none of them (called|followed|came)|I don'?t have detail)\b/i},
  {tag:'Repeat Contact',         re:/\b(repeat|second time|third time|fourth time|five times|four times|i'?ve called|been calling|recur(red|rence)?|same issue|again|called .{1,20}? (times|today)|last week|down again)\b/i},
  {tag:'Inconsistent Information',re:/\b(conflict|conflicting|inconsistent|contradicting|incorrect|wrong (diagnosis|info|information)|different (agents|answers|teams)|isolation|visibility|no visibility|in isolation|marked .{1,20}? resolved|each (contact|agent)|nobody noticed|i don'?t see (a|any)|cannot locate)\b/i}
];
function detectIssues(n){
  if(Array.isArray(n.issues)&&n.issues.length>0) return n.issues;
  const c=CASES.find(x=>x.key===curKey);
  if(c&&c.patterns&&c.patterns.some(p=>Array.isArray(p.ints)&&p.ints.length>0)){
    return c.patterns.filter(p=>Array.isArray(p.ints)&&p.ints.includes(n.seq)).map(p=>p.lbl);
  }
  const text=(n.out||'')+' '+(n.lines||[]).map(l=>l.tx).join(' ');
  return ISSUE_RULES.filter(r=>r.re.test(text)).map(r=>r.tag);
}
function countPatternInJourney(c,pat){
  /* Exclude last node (live call) until transcript is done */
  const nodes=window._transcriptDone ? c.nodes : c.nodes.slice(0, c.nodes.length-1);
  /* Count interactions where this pattern appears in n.issues[] */
  const fromIssues=nodes.filter(n=>Array.isArray(n.issues)&&n.issues.includes(pat.lbl)).length;
  if(fromIssues>0) return fromIssues;
  if(Array.isArray(pat.ints)&&pat.ints.length>0) return pat.ints.length;
  const descNum=(pat.desc||'').match(/(\d+)\+?\s+(times?|contacts?|calls?|agents?|interactions?|escalations?)/i);
  if(descNum) return parseInt(descNum[1],10);
  const rule=ISSUE_RULES.find(r=>r.tag===pat.lbl);
  const txt=n=>(n.out||'')+' '+(n.lines||[]).map(l=>l.tx).join(' ');
  if(rule) return c.nodes.filter(n=>rule.re.test(txt(n))).length;
  if(/channel switching/i.test(pat.lbl)) return new Set(c.nodes.map(n=>n.ch)).size;
  const stop=new Set(['gap','risk','loss','from','with','that','this','time','rate','full','left','fix']);
  const words=pat.lbl.toLowerCase().split(/\s+/).filter(w=>w.length>3&&!stop.has(w));
  if(!words.length) return 1;
  const re=new RegExp(words.map(w=>'\\b'+w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|'),'i');
  const hits=c.nodes.filter(n=>re.test(txt(n))).length;
  return hits||1;
}
function issueClass(tag){return 'ic-'+tag.toLowerCase().replace(/\s+/g,'-');}

/* ── sentence-level pattern highlighter ── */
function highlightPatterns(text,allowedTags){
  if(!text) return '';
  const escaped=String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const re=/[^.!?]+[.!?]+(?:\s+|$)|[^.!?]+$/g;
  let out='',m;
  while((m=re.exec(escaped))!==null){
    const sent=m[0];
    if(!sent.trim()){out+=sent;continue;}
    let hits=ISSUE_RULES.filter(r=>r.re.test(sent));
    if(allowedTags&&allowedTags.length) hits=hits.filter(r=>allowedTags.includes(r.tag));
    if(hits.length===0){out+=sent;continue;}
    const tag=hits[0].tag;
    const cls='hl-'+tag.toLowerCase().replace(/\s+/g,'-');
    const tip=hits.map(h=>h.tag).join(' · ');
    const trim=sent.replace(/\s+$/,'');
    const trail=sent.substring(trim.length);
    out+=`<mark class="hl-pattern ${cls}" title="Pattern: ${tip}">${trim}<span class="hl-tag">${tag}</span></mark>${trail}`;
  }
  return out;
}

/* ── action button mapping from verb ── */
function actionButton(txt){
  const t=(txt||'').toLowerCase();
  if(/\bcall\b/.test(t.split(/[—.,]/)[0])||/^call /.test(t)) return {ic:'fa-phone',lbl:'Call',cls:'btn-call'};
  if(/\bapologi[sz]e/.test(t)) return {ic:'fa-heart',lbl:'Apologize',cls:'btn-apologize'};
  if(/\b(schedule|follow.?up|check.?in)\b/.test(t)) return {ic:'fa-calendar-alt',lbl:'Schedule',cls:'btn-schedule'};
  if(/\b(email|sms|written|in writing)\b/.test(t)||/\bsend\b.*(email|message|summary|confirmation|written)/.test(t)) return {ic:'fa-envelope',lbl:'Send',cls:''};
  if(/\b(waive|credit|refund|reimburse|fee waiver)\b/.test(t)||/\bapply.*(credit|waiver|fee|tier)\b/.test(t)||/\bissue.*credit\b/.test(t)) return {ic:'fa-dollar-sign',lbl:'Apply',cls:'btn-apply'};
  if(/\b(note|flag)\b/.test(t)) return {ic:'fa-flag',lbl:'Flag account',cls:'btn-flag'};
  if(/\b(assign)\b/.test(t)) return {ic:'fa-user-plus',lbl:'Assign',cls:''};
  if(/\b(activate|process|trigger|initiate)\b/.test(t)) return {ic:'fa-bolt',lbl:'Activate',cls:''};
  if(/^confirm\b|\bconfirm /.test(t)) return {ic:'fa-check',lbl:'Confirm',cls:''};
  return {ic:'fa-bolt',lbl:'Take action',cls:''};
}

/* ── issue filter ── */
function toggleIssueFilter(tag){
  activeIssueFilter = (activeIssueFilter===tag) ? null : tag;
  applyIssueFilter();
}
function clearIssueFilter(){
  activeIssueFilter=null;
  applyIssueFilter();
}
function applyIssueFilter(){
  const c=CASES.find(x=>x.key===curKey); if(!c) return;
  const bar=document.getElementById('flt-bar');
  if(!bar) return;
  if(!activeIssueFilter){
    bar.classList.remove('on');
    bar.innerHTML='';
    document.querySelectorAll('.tl-node').forEach(el=>{
      el.classList.remove('dim','hl');
      el.style.outlineColor='';
    });
    document.querySelectorAll('.issue-chip').forEach(el=>el.classList.remove('active'));
    document.querySelectorAll('.pat-tbl tr').forEach(el=>el.classList.remove('active'));
    return;
  }
  const col=issueColor(activeIssueFilter);
  bar.classList.add('on');
  bar.innerHTML=`<span class="flt-bar-lbl">Filter:</span>
    <span class="flt-bar-tag ${issueClass(activeIssueFilter)}">${activeIssueFilter}</span>
    <span class="flt-bar-x" onclick="clearIssueFilter()" title="Clear filter"><i class="fas fa-times"></i></span>`;
  c.nodes.forEach((n,i)=>{
    const el=document.getElementById('hn'+i); if(!el) return;
    const matches=detectIssues(n).includes(activeIssueFilter);
    el.classList.remove('dim');
    el.classList.toggle('hl', matches);
    el.style.outlineColor = matches ? col : '';
  });
  document.querySelectorAll('.issue-chip').forEach(el=>{
    el.classList.toggle('active', el.textContent===activeIssueFilter);
  });
  document.querySelectorAll('.pat-tbl tr').forEach(el=>{
    el.classList.toggle('active', el.getAttribute('data-pat-lbl')===activeIssueFilter);
  });
}

/* ── pattern click → ensure Journey tab + filter + scroll ── */
function focusOnIssue(lbl){
  activeIssueFilter = (activeIssueFilter===lbl) ? null : lbl;
  applyIssueFilter();
  if(!activeIssueFilter) return;
  const c=CASES.find(x=>x.key===curKey); if(!c) return;
  const idx=c.nodes.findIndex(n=>detectIssues(n).includes(activeIssueFilter));
  if(idx>=0){
    const el=document.getElementById('hn'+idx);
    if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
  }
}
function onPatternClick(lbl){
  if(curTab!=='history'){
    switchTab('history');
    requestAnimationFrame(()=>{
      activeIssueFilter=lbl;
      applyIssueFilter();
      const c=CASES.find(x=>x.key===curKey); if(!c) return;
      const idx=c.nodes.findIndex(n=>detectIssues(n).includes(lbl));
      if(idx>=0){
        const el=document.getElementById('hn'+idx);
        if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
      }
    });
  } else {
    focusOnIssue(lbl);
  }
}

/* ── drawer ── */

  const n=c.nodes[idx];
  document.querySelectorAll('.tl-node').forEach(el=>el.classList.remove('sel'));
  const nd=document.getElementById('hn'+idx); if(nd) nd.classList.add('sel');
  document.getElementById('dr-ic').textContent=n.icon;
  document.getElementById('dr-ttl').textContent=`Contact ${n.seq} — ${n.chNm}`;
  document.getElementById('dr-sub').textContent=`${n.dt} · ${n.ag}`;
  document.getElementById('dr-sent').innerHTML=`${sentIcon(n.sent)}<span style="vertical-align:middle">${SL[n.sent]||n.sent}</span>`;
  document.getElementById('dr-csat').textContent=n.csat?`${n.csat}/5`:'—';
  document.getElementById('dr-dur').textContent=n.dur||'—';
  const ee=document.getElementById('dr-esc');
  ee.textContent=n.esc?'⚠️ Yes':'No'; ee.style.color=n.esc?'var(--err)':'inherit';
  const isLiveLastNode = !window._transcriptDone && idx === c.nodes.length - 1;
  const detected = isLiveLastNode ? [] : detectIssues(n);
  document.getElementById('dr-out').innerHTML=highlightPatterns(n.out,detected);
  const patsHdr=detected.length
    ? `<div class="dr-pats"><div class="dr-pats-lbl">Patterns detected in this contact</div>
        <div class="dr-pats-row">${detected.map(t=>`<span class="issue-chip ${issueClass(t)}">${t}</span>`).join('')}</div></div>`
    : `<div class="dr-pats"><div class="dr-pats-lbl">Patterns detected in this contact</div>
        <div class="dr-pats-empty">No failure patterns detected in this interaction.</div></div>`;
  const bubbles=n.lines.map(l=>{
    const cls=l.sp==='cust'?'b-cust':l.sp==='sys'?'b-sys':'b-agent';
    return `<div class="bubble ${cls}"><div class="bubble-sp">${l.nm}</div><div class="bubble-txt">${highlightPatterns(l.tx,detected)}</div></div>`;
  }).join('');
  document.getElementById('dr-body').innerHTML=patsHdr+bubbles;
  document.getElementById('overlay').classList.add('on');
  document.getElementById('drawer').classList.add('on');
}

function chatSendOnEnter(e){

function sendChatMessage(){

let trTimer=null,trIndex=0,trLines=[],trSeconds=0;
function startTranscript(c){
  const panel=document.getElementById('transcript-panel');
  const scroll=document.getElementById('tr-scroll');
  const nameEl=document.getElementById('tr-hdr-name');
  if(!panel||!scroll) return;
  // Build a flat sequence: for each node, prepend a divider item then its lines
  trLines=[];
  c.nodes.forEach(function(n){
    const patMap={'🔴':'sev-red','🟠':'sev-orange','🟡':'sev-yellow'};
    const issueLabels=Array.isArray(n.issues)&&n.issues.length>0 ? n.issues : (c.patterns||[]).filter(function(p){return Array.isArray(p.ints)&&p.ints.includes(n.seq);}).map(function(p){return p.lbl;});
    const pats=issueLabels.map(function(lbl){return (c.patterns||[]).find(function(p){return p.lbl===lbl;})||{sev:'🟡',lbl:lbl};});
    trLines.push({_divider:true,seq:n.seq,ttl:n.ttl||n.chNm,ch:n.chNm,icon:n.icon||'',pats:pats,patMap:patMap});
    n.lines.forEach(function(l){trLines.push({...l,isCust:l.sp==='cust'});});
  });
  trIndex=0; trSeconds=0;
  scroll.innerHTML='';
  nameEl.textContent=c.name;
  panel.classList.remove('hidden');
  clearInterval(trTimer);
  trTimer=setInterval(tickTranscript,2800);
  tickTranscript();
}
function tickTranscript(){
  const scroll=document.getElementById('tr-scroll');
  if(!scroll) return;
  const existing=scroll.querySelector('.tr-typing');
  if(existing) existing.remove();
  if(trIndex>=trLines.length){clearInterval(trTimer);return;}
  const item=trLines[trIndex]; trIndex++;
  if(item._divider){
    const div=document.createElement('div');
    div.className='tr-node-divider';
    let patsHtml='';
    if(item.pats&&item.pats.length){
      patsHtml='<div class="tr-patterns">'+item.pats.map(function(p){
        const cls=item.patMap[p.sev]||'sev-yellow';
        return '<span class="tr-pat '+cls+'">'+p.sev+' '+p.lbl+'</span>';
      }).join('')+'</div>';
    }
    div.innerHTML='<div class="tr-node-seq">'+item.icon+' Interaction '+item.seq+' &mdash; '+item.ch+'</div>'
      +'<div class="tr-node-ttl">'+item.ttl+'</div>'
      +patsHtml;
    scroll.appendChild(div);
    // immediately tick next (the first line of this node)
    if(trIndex<trLines.length){
      scroll.scrollTop=scroll.scrollHeight;
      return tickTranscript();
    }
    return;
  }
  trSeconds+=Math.floor(Math.random()*12+4);
  const mins=Math.floor(trSeconds/60),secs=trSeconds%60;
  const ts=String(mins).padStart(2,'0')+':'+String(secs).padStart(2,'0');
  const isCust=item.sp==='cust';
  const entry=document.createElement('div');
  entry.className='tr-entry';
  entry.innerHTML='<div class="tr-speaker'+(isCust?' cust-sp':'')+'">'+( item.nm||'System')+' <span class="tr-ts">'+ts+'</span></div><div class="tr-bubble'+(isCust?' cust':'')+'">'+item.tx+'</div>';
  scroll.appendChild(entry);
  if(trIndex<trLines.length){
    const typing=document.createElement('div');
    typing.className='tr-entry tr-typing';
    typing.innerHTML='<div class="tr-bubble typing"><div class="tr-dot"></div><div class="tr-dot"></div><div class="tr-dot"></div></div>';
    scroll.appendChild(typing);
  }
  scroll.scrollTop=scroll.scrollHeight;
}
function closeTranscript(){
  clearInterval(trTimer);
  const panel=document.getElementById('transcript-panel');
  if(panel) panel.classList.add('hidden');
}
function closeDrawer(){
  document.getElementById('overlay').classList.remove('on');
  document.getElementById('drawer').classList.remove('on');
  document.querySelectorAll('.tl-node').forEach(el=>el.classList.remove('sel'));
}

/* ── TASK AUTOMATION ── */
function createTask(idx, btn) {
  var assignees = {
    'Send':        {name:'Email Bot',    role:'Automated Notification',  avatar:'🤖'},
    'Assign':      {name:'Team Lead',    role:'Case Ownership Queue',    avatar:'👤'},
    'Take action': {name:'Supervisor',   role:'Escalation Manager',      avatar:'👔'},
    'Activate':    {name:'CRM Bot',      role:'Workflow Automation',     avatar:'⚡'},
    'default':     {name:'Agent Queue',  role:'Manual Review',           avatar:'📋'},
  };
  var label = btn.dataset.lbl || 'Take action';
  var card = document.getElementById('task-card-' + idx);
  if (!card) return;

  // Generate task ID
  var prefix = label === 'Send' ? 'EMAIL' : label === 'Assign' ? 'CASE' : 'TASK';
  var tid = prefix + '-' + Math.floor(1000 + Math.random() * 9000);
  var assignee = assignees[label] || assignees['default'];
  var now = new Date();
  var due = new Date(now.getTime() + (label === 'Send' ? 2 : label === 'Assign' ? 24 : 48) * 3600000);
  var dueStr = due.toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});

  // Disable button, show created state
  btn.innerHTML = '<i class="fas fa-check"></i> Created';
  btn.style.background = '#6b7280';
  btn.style.cursor = 'default';
  btn.onclick = null;

  // Render task card — Pending
  card.style.display = 'block';
  renderTaskCard(card, tid, assignee, dueStr, 'pending', 10);

  // → In Progress after 1s
  setTimeout(() => {
    renderTaskCard(card, tid, assignee, dueStr, 'inprogress', 55);
  }, 1000);

  // → Done after 2.5s
  setTimeout(() => {
    renderTaskCard(card, tid, assignee, dueStr, 'done', 100);
    btn.removeAttribute('style');
    btn.className = 'act-btn-done';
    btn.innerHTML = '<i class="fas fa-external-link-alt"></i> View Task';
    btn.addEventListener('click', function() { showToast(tid, assignee, label); }, {once: true});
    // Update counter badge
    var counter = document.getElementById('act-counter');
    if (counter) {
      var current = parseInt(counter.dataset.count || '0') + 1;
      var total = document.querySelectorAll('[data-idx]').length;
      counter.dataset.count = current;
      counter.style.display = 'inline-flex';
      counter.innerHTML = '<i class="fas fa-check-circle"></i> ' + current + ' of ' + total + ' automated';
    }
  }, 2500);
}

function showToast(tid, assignee, label) {
  var icons = {'Send':'fa-envelope','Assign':'fa-user-plus','Take action':'fa-bolt','Activate':'fa-bolt','default':'fa-tasks'};
  var icon = icons[label] || icons['default'];
  var container = document.getElementById('toast-container');
  var t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML =
    '<div class="toast-icon"><i class="fas ' + icon + '" style="color:#60a5fa"></i></div>' +
    '<div class="toast-body">' +
      '<div class="toast-title">Opening ' + tid + ' in CRM</div>' +
      '<div class="toast-sub">Assigned to ' + assignee.name + ' · ' + assignee.role + '</div>' +
    '</div>' +
    '<button class="toast-close" onclick="this.parentElement.remove()"><i class="fas fa-times"></i></button>';
  container.appendChild(t);
  requestAnimationFrame(() => { requestAnimationFrame(() => { t.classList.add('show'); }); });
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 4000);
}

function renderTaskCard(card, tid, assignee, due, status, progress) {
  const statusMap = {
    pending:    {cls:'ts-pending',    lbl:'Pending'},
    inprogress: {cls:'ts-inprogress', lbl:'In Progress'},
    done:       {cls:'ts-done',       lbl:'Completed'},
  };
  const s = statusMap[status];
  card.innerHTML = `
    <div class="task-hdr">
      <i class="fas fa-tasks" style="color:var(--p400);font-size:11px"></i>
      <span class="task-id">${tid}</span>
      <div class="task-status ${s.cls}">
        <div class="task-status-dot"></div>${s.lbl}
      </div>
    </div>
    <div class="task-progress"><div class="task-progress-bar" style="width:${progress}%"></div></div>
    <div class="task-body">
      <div class="task-row"><i class="fas fa-user-circle"></i><span>${assignee.avatar} <strong>${assignee.name}</strong> — ${assignee.role}</span></div>
      <div class="task-row"><i class="fas fa-clock"></i><span>Due: <strong>${due}</strong></span></div>
      <div class="task-row"><i class="fas fa-bell"></i><span>${status === 'done' ? '✅ Notification sent to assignee' : status === 'inprogress' ? '🔄 Assignee notified, working on it…' : '⏳ Queuing task for assignment…'}</span></div>
    </div>`;
}

    {c:1,n:"Jennifer",t:"That is the first time in nine contacts that anyone has offered me a direct line to a real person."},
    {c:0,n:"David",t:"It should have been offered on day one. I am also authorizing a reimbursement of $1,800 for your out-of-pocket emergency costs. Send me the receipts directly. No ticket. No queue."},
    {c:1,n:"Jennifer",t:"I have every receipt. I kept everything because I stopped trusting that anyone here was keeping records."},
    {c:0,n:"David",t:"You were right to do that. You contacted us nine times, used four channels, sent a formal complaint. At every point the failure was on our side. You did everything right."},
    {c:1,n:"Jennifer",t:"I am a twenty-year Platinum customer. I have never missed a premium payment. And the one time I needed SecureLife I had to fight for six weeks just to reach someone who could actually help."},
    {c:0,n:"David",t:"Twenty years. Your first claim. I am genuinely ashamed of how this was handled. I am opening an internal review of every single failure point on your claim."},
    {c:1,n:"Jennifer",t:"I came into this call prepared to cancel my policy. I want you to know that."},
    {c:0,n:"David",t:"I know. I am not asking you to decide anything today. Let the payment land, let the confirmation arrive, then decide based on what we actually do not what we say."},
    {c:1,n:"Jennifer",t:"The way you have spoken to me on this call is the way every one of those eight agents should have spoken to me. Own it, name it, fix it. That is all I ever needed."},
    {c:0,n:"David",t:"You deserved that from the very first call. I am sorry it took nine. The confirmation will be with you within the hour, Jennifer."},
    {c:1,n:"Jennifer",t:"Thank you."}
  ];

  function pad(n){return n<10?'0'+n:''+n;}

  function startDemo(){
    var panel  = document.getElementById('transcript-panel');
    var scroll = document.getElementById('tr-scroll');
    var nameEl = document.getElementById('tr-hdr-name');
    var timerEl= document.getElementById('call-timer');
    if(!panel||!scroll) return;

    /* Init global alert store */
    window._demoAlerts=[];
    window._transcriptDone=false;
    /* Show panel and clear it */
    panel.classList.remove('hidden');
    if(nameEl) nameEl.textContent='Jennifer Torres';
    scroll.innerHTML='';

    /* Interaction header */
    var hdr=document.createElement('div');
    hdr.className='tr-node-divider';
    hdr.innerHTML=
      '<div class="tr-node-seq">&#128222; Interaction 9 &mdash; Phone Call (Inbound)</div>'+
      '<div class="tr-node-ttl">Jennifer Escalates to Director Level &mdash; Full Resolution</div>'+
      '<div class="tr-patterns" id="int9-patterns" style="display:none">'+
        '<span class="tr-pat sev-red">&#128308; Repeat Contact</span>'+
        '<span class="tr-pat sev-red">&#128308; Broken Promise</span>'+
        '<span class="tr-pat sev-red">&#128308; SLA Breach</span>'+
        '<span class="tr-pat sev-red">&#128308; Ownership Gap</span>'+
      '</div>';
    scroll.appendChild(hdr);

    /* Start In-Call timer */
    var sec=0;
    if(timerEl) timerEl.textContent='00:00:00';
    callTimer=setInterval(function(){
      sec++;
      var h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60;
      if(timerEl) timerEl.textContent=pad(h)+':'+pad(m)+':'+pad(s);
    },1000);

    /* Message playback */
    var msgIdx=0, msgSec=0;
    function nextMsg(){
      var dot=scroll.querySelector('.lc-dot');
      if(dot) dot.parentNode.removeChild(dot);
      if(msgIdx>=MSGS.length){
        /* done — stop call timer, update status, unlock journey */
        clearInterval(callTimer);
        window._transcriptDone=true;
        /* Reveal Int 9 pattern badges now that call is done */
        var p9=document.getElementById('int9-patterns');
        if(p9) p9.style.display='';
        /* Drop risk score to 1 after call resolved */
        (function(){
          var cc=CASES.find(function(x){return x.key==='MC-CLM-SL-220648';});
          if(cc){ cc.score=1; cc.label='Low Risk'; cc.col='#16a34a'; }
        })();
        var inCallEl=document.querySelector('.in-call');
        if(inCallEl){
          inCallEl.classList.add('ended');
          var lbl=inCallEl.querySelector('span');
          if(lbl) lbl.textContent='Call Ended';
        }
        var liveEl=document.querySelector('.tr-live');
        if(liveEl){
          liveEl.style.animation='none';
          liveEl.innerHTML='<div style="width:6px;height:6px;border-radius:50%;background:var(--n300);flex-shrink:0"></div>'
            +'<span style="color:var(--n400);font-weight:600">Ended</span>';
        }
        /* If user is already on the Journey tab, refresh it to reveal the timeline */
        if(typeof curTab!=='undefined'&&curTab==='history'){
          var cc=CASES.find(function(x){return x.key===curKey;});
          if(cc) renderHistoryTab(cc);
        }
        return;
      }
      var m=MSGS[msgIdx++];
      msgSec+=Math.floor(Math.random()*8+4);
      var ts=pad(Math.floor(msgSec/60))+':'+pad(msgSec%60);
      var e=document.createElement('div');
      e.className='tr-entry';
      e.innerHTML=
        '<div class="tr-speaker'+(m.c?' cust-sp':'')+'">'+m.n+
        ' <span class="tr-ts">'+ts+'</span></div>'+
        '<div class="tr-bubble'+(m.c?' cust':'')+'">'+m.t+'</div>';
      scroll.appendChild(e);
      /* ── Pattern alert injection ── */
      var TRIGGERS={
        1:{lbl:'Repeat Contact',  sev:'yellow',msg:'Customer has contacted 9 times across 4 channels. No single owner identified.'},
        7:{lbl:'Broken Promise',  sev:'red',  msg:'3 callback commitments logged in agent notes. Zero follow-through on any of them.'},
        9:{lbl:'SLA Breach',      sev:'red',  msg:'Adjuster decision sat 12 days undelivered. Post-decision SLA breached by 11 days.'},
        11:{lbl:'Ownership Gap',  sev:'red',  msg:"Decision routed to dead email alias. Customer paying out-of-pocket due to unresolved claim."}
      };
      if(TRIGGERS[msgIdx]){
        var trig=TRIGGERS[msgIdx];
        var tc=document.getElementById('tab-content');
        if(tc){
          var alrt=document.createElement('div');
          alrt.className='pat-alert sev-'+trig.sev;
          alrt.setAttribute('data-lbl',trig.lbl);
          alrt.innerHTML=
            '<div class="pat-alert-icon">'+(trig.sev==='red'?'&#128308;':'&#128993;')+'</div>'+
            '<div class="pat-alert-body">'+
              '<div class="pat-alert-lbl">Pattern Detected &middot; '+trig.lbl+'</div>'+
              '<div class="pat-alert-msg">'+trig.msg+'</div>'+
            '</div>'+
            '<div class="pat-alert-cta">View in Journey &#8594;</div>';
          alrt.onclick=function(){
            var l=this.getAttribute('data-lbl');
            if(typeof onPatternClick==='function') onPatternClick(l);
          };
          window._demoAlerts.push(trig);
          tc.appendChild(alrt);
          tc.scrollTop=tc.scrollHeight;
        }
      }
      if(msgIdx<MSGS.length){
        var d=document.createElement('div');
        d.className='tr-entry lc-dot';
        d.innerHTML='<div class="tr-bubble typing">'+
          '<div class="tr-dot"></div><div class="tr-dot"></div><div class="tr-dot"></div></div>';
        scroll.appendChild(d);
      }
      scroll.scrollTop=scroll.scrollHeight;
      msgTimer=setTimeout(nextMsg,3000);
    }
    nextMsg();
  }

  /* Run after a short delay so init() finishes first */
  setTimeout(startDemo, 300);
})();
</script>
