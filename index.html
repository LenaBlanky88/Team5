<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Team 5 — We Win Together</title>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Inter:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:    #FFD046;
      --deep:    #0D0D0D;
      --mid:     #1A1A2E;
      --accent:  #FF4C6A;
      --light:   #F5F5F0;
      --muted:   #888;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--deep);
      color: var(--light);
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      padding: 2rem;
      overflow: hidden;
    }

    /* animated gradient orb */
    .hero::before {
      content: '';
      position: absolute;
      width: 700px; height: 700px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,208,70,.18) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation: pulse 4s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1);   opacity: .6; }
      50%       { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
    }

    .trophy {
      font-size: 5rem;
      animation: bounce 2s ease-in-out infinite;
      margin-bottom: 1rem;
      position: relative;
      z-index: 1;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0);    }
      50%       { transform: translateY(-12px); }
    }

    .hero-eyebrow {
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1rem;
      position: relative; z-index: 1;
    }

    .hero-title {
      font-family: 'Black Han Sans', sans-serif;
      font-size: clamp(4rem, 14vw, 11rem);
      line-height: .92;
      position: relative; z-index: 1;
      background: linear-gradient(135deg, var(--gold) 0%, #fff 50%, var(--gold) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      background-size: 200% 200%;
      animation: shimmer 3s linear infinite;
    }

    @keyframes shimmer {
      0%   { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }

    .hero-sub {
      font-size: clamp(1.1rem, 3vw, 1.6rem);
      font-weight: 300;
      color: var(--muted);
      margin-top: 1.25rem;
      position: relative; z-index: 1;
      letter-spacing: .04em;
    }

    .hero-sub span {
      color: var(--accent);
      font-weight: 600;
    }

    .scroll-hint {
      position: absolute;
      bottom: 2rem;
      font-size: .7rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--muted);
      animation: fadeUpDown 2s ease-in-out infinite;
    }

    @keyframes fadeUpDown {
      0%, 100% { opacity: .3; transform: translateY(0); }
      50%       { opacity: 1;  transform: translateY(6px); }
    }

    /* ── DIVIDER ── */
    .divider {
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: .3;
    }

    /* ── MEMBERS SECTION ── */
    .section {
      max-width: 1100px;
      margin: 0 auto;
      padding: 6rem 2rem;
    }

    .section-label {
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 3rem;
    }

    .members-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1.5rem;
    }

    .member-card {
      background: var(--mid);
      border: 1px solid rgba(255,208,70,.1);
      border-radius: 1rem;
      padding: 2rem 1.5rem;
      text-align: center;
      transition: transform .25s ease, border-color .25s ease, box-shadow .25s ease;
      cursor: default;
    }

    .member-card:hover {
      transform: translateY(-6px);
      border-color: rgba(255,208,70,.4);
      box-shadow: 0 12px 40px rgba(255,208,70,.08);
    }

    .member-avatar {
      width: 60px; height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--accent));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Black Han Sans', sans-serif;
      font-size: 1.4rem;
      color: var(--deep);
      margin: 0 auto 1rem;
    }

    .member-name {
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: .25rem;
    }

    .member-role {
      font-size: .75rem;
      color: var(--muted);
      letter-spacing: .05em;
    }

    /* ── STATS ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1px;
      background: rgba(255,255,255,.05);
      border-radius: 1rem;
      overflow: hidden;
      margin-top: 5rem;
    }

    .stat {
      background: var(--deep);
      padding: 2.5rem 2rem;
      text-align: center;
    }

    .stat-number {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 3rem;
      color: var(--gold);
      line-height: 1;
    }

    .stat-label {
      font-size: .75rem;
      color: var(--muted);
      letter-spacing: .15em;
      text-transform: uppercase;
      margin-top: .5rem;
    }

    /* ── MANIFESTO ── */
    .manifesto {
      background: var(--mid);
      padding: 6rem 2rem;
      text-align: center;
    }

    .manifesto-inner {
      max-width: 700px;
      margin: 0 auto;
    }

    .manifesto-quote {
      font-family: 'Black Han Sans', sans-serif;
      font-size: clamp(1.8rem, 5vw, 3rem);
      line-height: 1.2;
      color: var(--light);
    }

    .manifesto-quote em {
      font-style: normal;
      color: var(--gold);
    }

    .manifesto-author {
      margin-top: 2rem;
      font-size: .8rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── FOOTER ── */
    footer {
      padding: 3rem 2rem;
      text-align: center;
      font-size: .75rem;
      color: var(--muted);
      letter-spacing: .1em;
    }

    footer strong {
      color: var(--gold);
    }

    /* confetti pieces */
    .confetti-wrap {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .confetti-piece {
      position: absolute;
      width: 8px; height: 8px;
      opacity: 0;
      animation: fall linear infinite;
    }

    @keyframes fall {
      0%   { opacity: 1; transform: translateY(-20px) rotate(0deg); }
      100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
    }
  </style>
</head>
<body>

  <!-- Confetti -->
  <div class="confetti-wrap" id="confetti"></div>

  <!-- HERO -->
  <section class="hero">
    <div class="trophy">🏆</div>
    <h1 class="hero-title">TEAM 5</h1>
    <p class="scroll-hint">↓ &nbsp; scroll</p>
  </section>



  <script>
    // Generate confetti
    const wrap = document.getElementById('confetti');
    const colors = ['#FFD046', '#FF4C6A', '#ffffff', '#a78bfa', '#34d399'];
    for (let i = 0; i < 40; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.cssText = `
        left: ${Math.random() * 100}%;
        top: ${Math.random() * -50}%;
        background: ${colors[Math.floor(Math.random() * colors.length)]};
        border-radius: ${Math.random() > .5 ? '50%' : '2px'};
        width: ${4 + Math.random() * 8}px;
        height: ${4 + Math.random() * 8}px;
        animation-duration: ${4 + Math.random() * 8}s;
        animation-delay: ${Math.random() * 6}s;
      `;
      wrap.appendChild(el);
    }

    // Count-up animation for stats
    const statNumbers = document.querySelectorAll('.stat-number');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const el = entry.target;
          const target = parseInt(el.textContent);
          if (!isNaN(target) && target > 0) {
            let current = 0;
            const step = Math.ceil(target / 30);
            const timer = setInterval(() => {
              current = Math.min(current + step, target);
              el.textContent = current;
              if (current >= target) clearInterval(timer);
            }, 40);
          }
          observer.unobserve(el);
        }
      });
    }, { threshold: 0.5 });

    statNumbers.forEach(n => observer.observe(n));
  </script>
</body>
</html>
